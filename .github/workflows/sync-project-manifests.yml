name: Sync project manifests

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  sync:
    name: Sync project metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download project manifests
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          manifests = [
              "https://raw.githubusercontent.com/SimonGelbart/pattrn/main/docs/project.json",
              "https://raw.githubusercontent.com/SimonGelbart/lorq/main/docs/project.json",
              "https://raw.githubusercontent.com/SimonGelbart/dotnet-learning-lab/main/docs/project.json",
          ]

          projects = []
          for manifest in manifests:
              try:
                  with urllib.request.urlopen(manifest, timeout=20) as response:
                      projects.append(json.loads(response.read().decode("utf-8")))
              except Exception as exc:
                  print(f"Skipping {manifest}: {exc}")

          if not projects:
              raise SystemExit("No project manifests were downloaded.")

          target = pathlib.Path("data/projects.json")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(json.dumps(projects, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit synchronized metadata
        run: |
          if git diff --quiet -- data/projects.json; then
            echo "No metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git commit -m "chore: sync project manifests"
          git push
